<!-- Student Mark Predictor App GUI -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Predictor</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#16245c,#2d5be3);
            min-height:100vh;
        }

        /* Banner */

        .banner img{
            width:100%;
            display:block;
            border-radius:0 0 25px 25px;
        }

        /* Container */

        .container{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:50px 20px;
        }

        /* Card */

        .card{
            width:100%;
            max-width:650px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(12px);
            border-radius:20px;
            padding:40px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.35);
        }

        .card h1{
            color:white;
            font-size:38px;
            margin-bottom:15px;
        }

        .card p{
            color:#f2f2f2;
            font-size:18px;
            margin-bottom:35px;
        }

        /* Input */

        input{
            width:85%;
            padding:16px;
            border:none;
            border-radius:12px;
            outline:none;
            font-size:18px;
            margin-bottom:25px;
        }

        /* Button */

        button{
            width:85%;
            padding:16px;
            border:none;
            border-radius:12px;
            background:#FFA500;
            color:white;
            font-size:20px;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#ff8c00;
            transform:translateY(-2px);
            box-shadow:0 8px 20px rgba(0,0,0,.3);
        }

        /* Prediction Result */

        .result{
            margin-top:30px;
            background:white;
            color:#1f2937;
            padding:18px;
            border-radius:12px;
            font-size:22px;
            font-weight:600;
            width:85%;
            margin-left:auto;
            margin-right:auto;
        }

        @media(max-width:768px){

            .card{
                padding:30px 20px;
            }

            .card h1{
                font-size:30px;
            }

            .card p{
                font-size:16px;
            }

            input,
            button,
            .result{
                width:100%;
            }
        }

    </style>

</head>

<body>

    <!-- University Banner -->

    <div class="banner">
        <img src="{{ url_for('static', filename='images/college_banner2.png') }}" alt="University Banner">
    </div>

    <!-- Prediction Card -->

    <div class="container">

        <div class="card">

            <h1>📚 Student Marks Predictor</h1>

            <p>
                Enter your study hours to estimate your expected examination marks using Machine Learning.
            </p>

            <form action="{{ url_for('predict') }}" method="POST">

                <input
                    type="number"
                    name="study_hours"
                    step="0.1"
                    min="0"
                    max="24"
                    placeholder="Enter Study Hours"
                    required>

                <br>

                <button type="submit">
                    Predict Marks
                </button>

            </form>

            {% if prediction_text %}

            <div class="result">

                {{ prediction_text }}

            </div>

            {% endif %}

        </div>

    </div>

</body>

</html>
