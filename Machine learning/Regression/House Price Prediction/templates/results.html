<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: Segoe UI, sans-serif
        }

        .card {
            max-width: 700px;
            margin: 80px auto;
            padding: 40px;
            border: none;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .2)
        }

        h1 {
            font-weight: 700;
            color: #1e3c72
        }

        .result {
            background: #f8f9fa;
            border-left: 5px solid #2563eb;
            padding: 20px;
            border-radius: 10px
        }

        .price {
            color: #198754;
            font-size: 22px;
            font-weight: 600
        }

        .btn-primary {
            background: #2563eb;
            border: none
        }

        .btn-primary:hover {
            background: #1d4ed8
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card">

            <h1 class="text-center mb-4">Prediction Result</h1>

            <div class="result mb-4">
                <h4>Model: {{ model_name }}</h4>
                <p class="price">Predicted Price: {{ prediction }}</p>
            </div>

            <div class="text-center">
                <a href="/" class="btn btn-primary me-2">Make Another Prediction</a>
                <a href="/results" class="btn btn-secondary">View Model Evaluation Results</a>
            </div>

        </div>

    </div>

</body>

</html>
