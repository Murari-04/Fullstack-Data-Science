<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Model Evaluation Results</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>

body{background:linear-gradient(135deg,#1e3c72,#2a5298);font-family:'Segoe UI',sans-serif}
.card{max-width:1150px;margin:35px auto;padding:30px;border:0;border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,.25)}
h1{color:#1e3c72;font-weight:700}
.table-responsive{overflow-x:auto}
table{width:100%;border-collapse:collapse;text-align:center;font-size:15px}
table th{background:#2563eb;color:#fff;padding:12px;border:1px solid #dee2e6}
table td{padding:10px;border:1px solid #dee2e6}
table tbody tr:nth-child(even){background:#f8f9fa}
table tbody tr:hover{background:#e9f2ff}
.btn-primary{background:#2563eb;border:0;border-radius:8px;padding:10px 25px;font-weight:600}
.btn-primary:hover{background:#1d4ed8}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h1 class="text-center mb-4">
<i class="bi bi-bar-chart-fill me-2"></i>Model Evaluation Results
</h1>

<div class="table-responsive">
{% for table in tables %}
{{ table|safe }}
{% endfor %}
</div>

<div class="text-center mt-4">
<a href="/" class="btn btn-primary">
<i class="bi bi-arrow-left-circle me-2"></i> Go Back
</a>
</div>

</div>
</div>

</body>
</html>
