<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Regression Model Prediction</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#1e3c72,#2a5298);font-family:Segoe UI,sans-serif}
.card{max-width:850px;margin:40px auto;padding:30px;border:0;border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,.2)}
h1{font-weight:700;color:#1e3c72}
label{font-weight:600}
.form-control,.form-select{border-radius:10px}
.btn-primary{background:#2563eb;border:0}
.btn-primary:hover{background:#1d4ed8}
</style>
</head>

<body>
<div class="container">
<div class="card">

<h1 class="text-center mb-4">Regression Model Prediction</h1>

<form action="/predict" method="POST">

<div class="mb-3"><label><i class="bi bi-cash-stack text-primary me-2"></i>Average Area Income:</label><input type="number" step="any" class="form-control" name="Avg. Area Income" required></div>

<div class="mb-3"><label><i class="bi bi-house-door-fill text-primary me-2"></i>Average Area House Age:</label><input type="number" step="any" class="form-control" name="Avg. Area House Age" required></div>

<div class="mb-3"><label><i class="bi bi-door-open-fill text-primary me-2"></i>Average Area Number of Rooms:</label><input type="number" step="any" class="form-control" name="Avg. Area Number of Rooms" required></div>

<div class="mb-3"><label><i class="bi bi-bed-fill text-primary me-2"></i>Average Area Number of Bedrooms:</label><input type="number" step="any" class="form-control" name="Avg. Area Number of Bedrooms" required></div>

<div class="mb-3"><label><i class="bi bi-people-fill text-primary me-2"></i>Area Population:</label><input type="number" step="any" class="form-control" name="Area Population" required></div>

<div class="mb-4">
<label><i class="bi bi-cpu-fill text-primary me-2"></i>Select Model:</label>
<select class="form-select" name="model">
{% for model_name in model_names %}
<option value="{{ model_name }}">{{ model_name }}</option>
{% endfor %}
</select>
</div>

<button class="btn btn-primary w-100"><i class="bi bi-bar-chart-line-fill me-2"></i>Predict</button>

</form>

<div class="text-center mt-4">
<a href="/results" class="btn btn-secondary">
<i class="bi bi-graph-up-arrow me-2"></i>View Model Evaluation Results
</a>
</div>

</div>
</div>
</body>
</html>
